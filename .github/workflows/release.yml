name: Release & Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install system dependencies
        run: sudo apt-get install -y libfontconfig1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild skia-canvas for Linux
        run: |
          SKIA=$(node -e "const p=require('path');const m=require('module');const r=m.createRequire(p.join(process.cwd(),'packages/marknative/package.json'));console.log(r.resolve('skia-canvas/package.json').replace('/package.json',''))")
          cd "$SKIA" && npx node-pre-gyp install --fallback-to-build=false

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: cd packages/marknative && npm publish --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
